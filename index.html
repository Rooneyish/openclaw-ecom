<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrinterHub - Printer eCommerce Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product-card h3 {
            margin: 10px 0;
            font-size: 18px;
        }
        .product-card p {
            color: #666;
            margin: 8px 0;
        }
        .price {
            font-size: 24px;
            color: #2ecc71;
            font-weight: bold;
            margin: 10px 0;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <header>
        <h1>🖨️ PrinterHub</h1>
        <p>Quality Printers at Great Prices</p>
    </header>

    <div class="container">
        <div class="products">
            <div class="product-card">
                <h3>Pro Laser 3000</h3>
                <p>High-speed laser printing</p>
                <p class="price">$299.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <h3>InkJet Plus</h3>
                <p>Color printing perfection</p>
                <p class="price">$149.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <h3>Portable Mobile</h3>
                <p>Compact wireless printer</p>
                <p class="price">$199.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <h3>All-in-One Office</h3>
                <p>Print, scan, copy, fax</p>
                <p class="price">$399.99</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
